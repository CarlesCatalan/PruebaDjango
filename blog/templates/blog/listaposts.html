{% extends 'blog/base.html' %}
{% block title %}Posts Django{% endblock %}
{% block content %}
<div class="top-links">
    <a href="{% url 'home' %}">Volver al inicio</a>
</div>
<h1>Lista de Posts</h1>
<p class="subtitle">Contenido creado en tu modelo Post.</p>
{% for post in posts %}
<div class="card">
    <strong>{{ post.titulo }}</strong>
    <p>{{ post.contenido }}</p>
</div>
{% empty %}
<p>No hay posts todavía.</p>
{% endfor %}
{% endblock %}
