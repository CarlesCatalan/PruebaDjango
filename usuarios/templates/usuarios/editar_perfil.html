{% extends 'base.html' %}
{% block title %}Editar Perfil{% endblock %}
{% block content %}
<div class="top-links">
    <a href="{% url 'perfil' %}">Volver a perfil</a>
    <a href="{% url 'home' %}">Inicio</a>
</div>
<h1>Editar perfil</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
</form>
{% endblock %}
