{% extends 'base.html' %}
{% block title %}Perfil{% endblock %}
{% block content %}
<div class="top-links">
    <a href="{% url 'home' %}">Inicio</a>
</div>
<h1>Perfil de {{ request.user.username }}</h1>
{% if profile and profile.foto %}
<img src="{{ profile.foto.url }}" alt="Foto" width="150">
{% endif %}
<p>{{ profile.bio }}</p>
<a href="{% url 'editar_perfil' %}">Editar perfil</a>
{% endblock %}
